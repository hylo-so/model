[settings]
# Simulation core parameters
# beta: Price volatility multiplier (>1 more volatile, <1 less volatile than historical)
beta = 1.0

# T: Total number of time steps in simulation
T = 1411

# N: Number of parallel simulations
N = 20

# Number of runs per stability mode parameter
num_runs_per_path = 20

# Stability mode threshold parameters
# Lower bound for stability mode activation threshold
s_mode_lower = 1.1

# Upper bound for stability mode activation threshold
s_mode_upper = 1.6

# Step size for stability mode threshold testing
s_mode_step = 0.05

# Initial SOL amount in the system
amount_SOL_initial = 300

# hyUSD-SOL Stability Pool parameters
# Minimum daily recovery percentage (0.5% per day)
min_recovery_per = 0.005

# Maximum daily recovery percentage (5% per day)
max_recovery_per = 0.05

# Percentage of hyUSD staked in hyUSD-SOL stability pool (0% mean this is disabled)
hyUSD_staked_per = 0

# hyUSD-xSOL Stability Pool parameters
# Minimum daily recovery percentage (0.5% per day)
min_recovery_per_2 = 0.005

# Maximum daily recovery percentage (5% per day)
max_recovery_per_2 = 0.05

# Percentage of hyUSD staked in hyUSD-xSOL stability pool
hyUSD_staked_per_2 = 0.6

[action_probabilities]
# CR > 5: Extremely safe state
# High probability of minting hyUSD when system is over-collateralized
CR5_hyUSD_mint = 1.0

# Low probability of minting xSOL when system is over-collateralized
CR5_xSOL_mint = 0.1

# 3 < CR <= 5: Very safe state
# Still high probability of minting hyUSD in healthy state
CR3-5_hyUSD_mint = 0.9

# Moderate-low probability of minting xSOL in healthy state
CR3-5_xSOL_mint = 0.25

# 2.2 < CR <= 3: Safe state
# Slightly reduced probability of minting hyUSD
CR22-3_hyUSD_mint = 0.8

# Increased probability of minting xSOL to improve ratio
CR22-3_xSOL_mint = 0.4

# stability_mode < CR <= 2.2: Healthy state
# Reduced hyUSD minting as system approaches stability mode
CRmode2-22_hyUSD_mint = 0.6

# Higher xSOL minting to help restore ratio
CRmode2-22_xSOL_mint = 0.6

# 1 < CR <= stability_mode: Stability mode active
#  No hyUSD minting while in stability mode, desactivated
CR1-mode2_hyUSD_mint = 0

# High xSOL minting to take advantage of high leverage appeal
CR1-mode2_xSOL_mint = 0.75

[mint_amount]
# CR > 5: Extremely safe state
# High hyUSD minting, minimal burns
CR5_hyUSD_mint_mean = 0.05
CR5_hyUSD_mint_std = 0.1
CR5_hyUSD_burn_mean = 0.00
CR5_hyUSD_burn_std = 0.01

# Low xSOL minting, high burns due to low leverage appeal
CR5_xSOL_mint_mean = 0.00
CR5_xSOL_mint_std = 0.01
CR5_xSOL_burn_mean = 0.05
CR5_xSOL_burn_std = 0.1

# 3 < CR <= 5: Very safe state
# Moderate hyUSD minting, minimal burns
CR3-5_hyUSD_mint_mean = 0.03
CR3-5_hyUSD_mint_std = 0.08
CR3-5_hyUSD_burn_mean = 0.00
CR3-5_hyUSD_burn_std = 0.02

# Low xSOL minting, moderate burns
CR3-5_xSOL_mint_mean = 0.00
CR3-5_xSOL_mint_std = 0.02
CR3-5_xSOL_burn_mean = 0.03
CR3-5_xSOL_burn_std = 0.08

# 2.2 < CR <= 3: Safe state
# Reduced hyUSD minting, low burns
CR22-3_hyUSD_mint_mean = 0.02
CR22-3_hyUSD_mint_std = 0.05
CR22-3_hyUSD_burn_mean = 0.01
CR22-3_hyUSD_burn_std = 0.03

# Increased xSOL minting, low burns
CR22-3_xSOL_mint_mean = 0.01
CR22-3_xSOL_mint_std = 0.04
CR22-3_xSOL_burn_mean = 0.01
CR22-3_xSOL_burn_std = 0.03

# stability_mode < CR <= 2.2: Approaching stability mode
# Low hyUSD minting, moderate burns
CRmode2-22_hyUSD_mint_mean = 0.01
CRmode2-22_hyUSD_mint_std = 0.03
CRmode2-22_hyUSD_burn_mean = 0.03
CRmode2-22_hyUSD_burn_std = 0.05

# High xSOL minting, minimal burns
CRmode2-22_xSOL_mint_mean = 0.03
CRmode2-22_xSOL_mint_std = 0.05
CRmode2-22_xSOL_burn_mean = 0.01
CRmode2-22_xSOL_burn_std = 0.03

# 1 < CR <= stability_mode: Stability mode active
# Minimal hyUSD minting, high burns
CR1-mode2_hyUSD_mint_mean = 0.00
CR1-mode2_hyUSD_mint_std = 0.01
CR1-mode2_hyUSD_burn_mean = 0.05
CR1-mode2_hyUSD_burn_std = 0.1

# Moderate xSOL minting, minimal burns
CR1-mode2_xSOL_mint_mean = 0.02
CR1-mode2_xSOL_mint_std = 0.04
CR1-mode2_xSOL_burn_mean = 0.00
CR1-mode2_xSOL_burn_std = 0.02
